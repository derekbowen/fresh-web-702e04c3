name: Breadcrumbs JSON-LD check

on:
  pull_request:
    paths:
      - 'src/components/templates/**'
      - 'src/components/breadcrumbs-jsonld.tsx'
      - 'scripts/check-breadcrumb-jsonld.mjs'
      - '.github/workflows/breadcrumbs-jsonld.yml'
      - 'package.json'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate BreadcrumbList JSON-LD on every template
        run: bun run check:breadcrumbs
